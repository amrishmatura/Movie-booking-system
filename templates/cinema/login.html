{% extends 'base.html' %}
{% block title %}Login | CinemaBook{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16 glass-panel rounded-3xl p-8 shadow-2xl relative overflow-hidden">
    <!-- Decorative background elements -->
    <div class="absolute -top-24 -right-24 w-48 h-48 bg-premium-accent rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
    <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
    
    <div class="relative z-10 text-center mb-10">
        <h2 class="text-3xl font-extrabold text-white">Welcome Back</h2>
        <p class="text-gray-400 mt-2 text-sm">Sign in to your CinemaBook account.</p>
    </div>

    <!-- Login Form -->
    <form method="post" action="{% url 'login' %}" class="space-y-6 relative z-10">
        {% csrf_token %}
        
        {% if form.errors %}
            <div class="p-3 bg-red-500/20 border border-red-500/50 rounded-xl text-red-500 text-sm font-medium">
                Invalid email or password. Please try again.
            </div>
        {% endif %}

        <div>
            <label for="id_username" class="block text-sm font-semibold text-gray-300 mb-2">Email Address</label>
            <input type="text" name="username" id="id_username" required autofocus
                class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl focus:ring-2 focus:ring-premium-accent focus:border-transparent text-white placeholder-gray-500 transition-all font-medium"
                placeholder="you@example.com">
        </div>

        <div>
            <label for="id_password" class="block text-sm font-semibold text-gray-300 mb-2">Password</label>
            <input type="password" name="password" id="id_password" required
                class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl focus:ring-2 focus:ring-premium-accent focus:border-transparent text-white placeholder-gray-500 transition-all font-medium"
                placeholder="••••••••">
        </div>

        <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg shadow-premium-accent/20 text-md font-bold text-gray-900 bg-premium-accent hover:bg-premium-accenthover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-premium-accent transition duration-300 transform hover:-translate-y-1">
            Sign In
        </button>
    </form>
    
    <p class="mt-8 text-center text-sm text-gray-400 relative z-10 font-medium">
        Don't have an account? 
        <a href="{% url 'register' %}" class="text-premium-accent hover:text-white transition duration-200">Register here</a>
    </p>
</div>
{% endblock %}
