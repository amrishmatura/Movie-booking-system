{% extends 'base.html' %}
{% block title %}Register | CinemaBook{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12 glass-panel rounded-3xl p-8 shadow-2xl relative overflow-hidden">
    <div class="absolute -top-24 -left-24 w-48 h-48 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
    <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-premium-accent rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
    
    <div class="relative z-10 text-center mb-8">
        <h2 class="text-3xl font-extrabold text-white">Create Account</h2>
        <p class="text-gray-400 mt-2 text-sm">Join CinemaBook for a premium experience.</p>
    </div>

    <!-- Registration Form -->
    <form method="post" action="{% url 'register' %}" class="space-y-5 relative z-10">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-semibold text-gray-300 mb-1">Full Name</label>
            <input type="text" name="full_name" required
                class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg focus:ring-2 focus:ring-premium-accent focus:border-transparent text-white placeholder-gray-500 transition-all font-medium"
                placeholder="John Doe">
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-300 mb-1">Email Address</label>
            <input type="email" name="email" required
                class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg focus:ring-2 focus:ring-premium-accent focus:border-transparent text-white placeholder-gray-500 transition-all font-medium"
                placeholder="john@example.com">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-1">Password</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg focus:ring-2 focus:ring-premium-accent focus:border-transparent text-white placeholder-gray-500 transition-all font-medium"
                    placeholder="••••••••">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-1">Confirm</label>
                <input type="password" name="confirm_password" required
                    class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg focus:ring-2 focus:ring-premium-accent focus:border-transparent text-white placeholder-gray-500 transition-all font-medium"
                    placeholder="••••••••">
            </div>
        </div>

        <button type="submit" class="mt-4 w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg shadow-premium-accent/20 text-md font-bold text-gray-900 bg-premium-accent hover:bg-premium-accenthover focus:outline-none transition duration-300 transform hover:-translate-y-1">
            Register Now
        </button>
    </form>
    
    <p class="mt-6 text-center text-sm text-gray-400 relative z-10 font-medium">
        Already have an account? 
        <a href="{% url 'login' %}" class="text-premium-accent hover:text-white transition duration-200">Sign in</a>
    </p>
</div>
{% endblock %}
